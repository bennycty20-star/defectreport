// MODIFIED: Added debounce for localStorage saves to improve perf
const debounce = (fn, delay) => {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
};

const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2, 11));
const pad3 = (n) => String(n).padStart(3, "0");
const today = () => new Date().toISOString().slice(0, 10);
function zonePrefix(name = "") {
  const w = name.trim().split(/\s+/);
  if (w.length >= 2) return (w[0][0] + w[1][0]).toUpperCase();
  return (name.slice(0, 2)).toUpperCase();
}
function nextId(issues, zoneName) {
  const prefix = zonePrefix(zoneName);
  const last = issues.filter(i => i.prefix === prefix).reduce((m, i) => Math.max(m, i.seq ?? 0), 0);
  const seq = last + 1;
  return { prefix, seq, defectId: `${prefix}-${pad3(seq)}` };
}
function hexRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
const STATUS   = ["Open","In Progress","Resolved","Closed"];
const SEVERITY = ["Critical","High","Medium","Low","Observation"];
const SC = { Critical:"#ef4444", High:"#f97316", Medium:"#eab308", Low:"#22c55e", Observation:"#3b82f6" };
const TC = { Open:"#ef4444", "In Progress":"#f97316", Resolved:"#22c55e", Closed:"#6b7280" };

/* ─── image compressor ──────────────────────────────────────────── */
function compressImage(dataUrl, maxW = 1400, q = 0.82) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale  = img.width > maxW ? maxW / img.width : 1;
      const canvas = document.createElement("canvas");
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      res(canvas.toDataURL("image/jpeg", q));
    };
    img.onerror = () => res(dataUrl);
    img.src = dataUrl;
  });
}

/* ─── draw a teardrop pin onto a canvas context ────────────── */
function drawPinOnCanvas(ctx, cx, cy, label, color, scale = 1) {
  const r = 13 * scale;
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 7 * scale;
  ctx.beginPath();
  ctx.arc(cx, cy - r * 0.35, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2.5 * scale;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.38, cy - r * 0.35 + r * 0.72);
  ctx.lineTo(cx, cy + r * 1.62);
  ctx.lineTo(cx + r * 0.38, cy - r * 0.35 + r * 0.72);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2 * scale;
  ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.shadowBlur = 0;
  ctx.fillStyle = "white";
  ctx.font = `bold ${Math.round(10 * scale)}px monospace`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(String(label), cx, cy - r * 0.35);
  ctx.restore();
}

/* ─── draw defectId label badge beside a pin ───────────────── */
function drawLabelBadge(ctx, cx, cy, defectId, color, scale = 1) {
  const r = 13 * scale;
  const lx = cx + r + 4 * scale;
  const ly = cy - r * 0.35 - 5 * scale;
  ctx.save();
  ctx.font = `bold ${Math.round(9.5 * scale)}px monospace`;
  const tw = ctx.measureText(defectId).width;
  const bw = tw + 10 * scale, bh = 15 * scale;
  ctx.fillStyle = "rgba(4,8,20,0.88)";
  ctx.beginPath();
  if (ctx.roundRect) { ctx.roundRect(lx, ly, bw, bh, 3 * scale); } else { ctx.rect(lx, ly, bw, bh); }
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5 * scale;
  ctx.beginPath();
  if (ctx.roundRect) { ctx.roundRect(lx, ly, bw, bh, 3 * scale); } else { ctx.rect(lx, ly, bw, bh); }
  ctx.stroke();
  ctx.fillStyle = "#93c5fd";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText(defectId, lx + 5 * scale, ly + bh / 2);
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   PDF GENERATOR — canvas-based, no external library
═══════════════════════════════════════════════════════════════ */

/* ── Binary-safe multi-page PDF builder ────────────────────────
   Each canvas page is encoded as a JPEG stream.
   We track byte offsets using a running Uint8Array accumulator
   so the xref table is always correct.
────────────────────────────────────────────────────────*/
function buildPDF(canvases, filename) {
  // Convert base64 dataUrl to Uint8Array of raw bytes
  const dataUrlToBytes = (dataUrl) => {
    const b64 = dataUrl.split(",")[1];
    const bin = atob(b64);
    const u8  = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
    return u8;
  };

  // Encode ASCII string to bytes (never use TextEncoder — it produces UTF-8
  // multi-byte sequences for non-ASCII chars which breaks byte offset counts)
  const strBytes = (s) => {
    const u8 = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) u8[i] = s.charCodeAt(i) & 0xff;
    return u8;
  };

  // Running byte accumulator
  const chunks = [];
  let byteLen  = 0;
  const wb = (u8)  => { chunks.push(u8); byteLen += u8.length; };
  const ws = (str) => wb(strBytes(str));

  // Object offset table
  const offsets = [];
  const startObj = (id) => { offsets[id] = byteLen; ws(id + " 0 obj\n"); };
  const endObj   = ()   => ws("endobj\n");

  const N        = canvases.length;
  // Object layout (all 1-indexed):
  //   1         = catalog
  //   2         = pages
  //   3+i*3     = image XObject for page i
  //   4+i*3     = content stream for page i
  //   5+i*3     = page dict for page i
  const imgObj  = (i) => 3 + i * 3;
  const csObj   = (i) => 4 + i * 3;
  const pgObj   = (i) => 5 + i * 3;
  const numObjs = 3 + N * 3;   // total objects (object IDs 1..numObjs-1, plus free 0)

  ws("%PDF-1.4\n%\x80\x80\x80\x80\n");   // binary hint comment (4 bytes > 127)

  // 1. Catalog
  startObj(1);
  ws("<< /Type /Catalog /Pages 2 0 R >>\n");
  endObj();

  // 2. Pages tree
  startObj(2);
  const kids = Array.from({length: N}, (_, i) => pgObj(i) + " 0 R").join(" ");
  ws("<< /Type /Pages /Kids [" + kids + "] /Count " + N + " >>\n");
  endObj();

  const A4W = 595.28, A4H = 841.89;

  for (let i = 0; i < N; i++) {
    const jpegBytes = dataUrlToBytes(canvases[i].toDataURL("image/jpeg", 0.88));
    const W = canvases[i].width, H = canvases[i].height;

    // 3+i*3. Image XObject
    startObj(imgObj(i));
    ws("<< /Type /XObject /Subtype /Image /Width " + W + " /Height " + H +
       " /ColorSpace /DeviceRGB /BitsPerComponent 8" +
       " /Filter /DCTDecode /Length " + jpegBytes.length + " >>\n" +
       "stream\n");
    wb(jpegBytes);
    ws("\nendstream\n");
    endObj();

    // 4+i*3. Content stream
    const cs      = "q " + A4W + " 0 0 " + A4H + " 0 0 cm /Im" + i + " Do Q";
    const csBytes = strBytes(cs);
    startObj(csObj(i));
    ws("<< /Length " + csBytes.length + " >>\nstream\n");
    wb(csBytes);
    ws("\nendstream\n");
    endObj();

    // 5+i*3. Page object
    startObj(pgObj(i));
    ws("<< /Type /Page /Parent 2 0 R" +
       " /MediaBox [0 0 " + A4W + " " + A4H + "]" +
       " /Contents " + csObj(i) + " 0 R" +
       " /Resources << /XObject << /Im" + i + " " + imgObj(i) + " 0 R >> >> >>\n");
    endObj();
  }

  // Cross-reference table
  // Each entry MUST be exactly 20 bytes: "nnnnnnnnnn ggggg x \r\n"
  const xrefPos = byteLen;
  ws("xref\n0 " + numObjs + "\n");
  // Free entry for object 0
  ws("0000000000 65535 f\r\n");
  // In-use entries for objects 1 .. numObjs-1
  for (let id = 1; id < numObjs; id++) {
    const off = String(offsets[id] || 0).padStart(10, "0");
    ws(off + " 00000 n\r\n");
  }
  ws("trailer\n<< /Size " + numObjs + " /Root 1 0 R >>\nstartxref\n" + xrefPos + "\n%%EOF\n");

  // Assemble all chunks into one Uint8Array
  const out = new Uint8Array(byteLen);
  let pos = 0;
  for (const c of chunks) { out.set(c, pos); pos += c.length; }

  const blob = new Blob([out], { type: "application/pdf" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

/* ── Canvas page helpers ──────────────────────────────────────────*/
const PX = 2480, PY = 3508;          // A4 @ 300dpi
const SCALE = PX / 210;              // px per mm

function mm(v) { return Math.round(v * SCALE); }

function makeCanvas() {
  const c = document.createElement("canvas");
  c.width = PX; c.height = PY;
  return c;
}

function pageCtx(cv) {
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#080f1e";
  ctx.fillRect(0, 0, PX, PY);
  return ctx;
}

function pRect(ctx, x, y, w, h, fill, stroke, lw=0.5) {
  if (fill)   { ctx.fillStyle   = fill;   ctx.fillRect(mm(x),mm(y),mm(w),mm(h)); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = mm(lw); ctx.strokeRect(mm(x),mm(y),mm(w),mm(h)); }
}

function pText(ctx, text, x, y, { sz=4, bold=false, color="#e2e8f0", align="left" }={}) {
  ctx.save();
  ctx.font = `${bold?"bold ":""}${mm(sz)}px Arial,sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = "alphabetic";
  ctx.fillText(String(text ?? ""), mm(x), mm(y));
  ctx.restore();
}

function pLine(ctx, x1, y1, x2, y2, color="#1e3358", lw=0.4) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = mm(lw);
  ctx.beginPath(); ctx.moveTo(mm(x1),mm(y1)); ctx.lineTo(mm(x2),mm(y2)); ctx.stroke();
  ctx.restore();
}

function pCircle(ctx, cx, cy, r, fill) {
  ctx.save();
  ctx.fillStyle = fill;
  ctx.beginPath(); ctx.arc(mm(cx), mm(cy), mm(r), 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function pImage(ctx, dataUrl, x, y, w, h) {
  return new Promise(res => {
    if (!dataUrl) { res(); return; }
    const img = new Image();
    img.onload = () => { try { ctx.drawImage(img, mm(x), mm(y), mm(w), mm(h)); } catch {} res(); };
    img.onerror = res;
    img.src = dataUrl;
  });
}

// Word-wrap text into lines that fit within maxW mm
function wrapText(ctx, text, sz, maxW) {
  ctx.save();
  ctx.font = `${mm(sz)}px Arial,sans-serif`;
  const words = String(text).split(" ");
  const lines = [];
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > mm(maxW) && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  ctx.restore();
  return lines;
}

/* Annotate drawing: draw pins + ID badges, return jpeg dataUrl */
function buildAnnotatedImage(imageData, pinnedIssues) {
  return new Promise(res => {
    if (!imageData) { res(null); return; }
    const img = new Image();
    img.onload = () => {
      try {
        const cv = document.createElement("canvas");
        cv.width  = Math.max(img.naturalWidth  || 1200, 1);
        cv.height = Math.max(img.naturalHeight || 800,  1);
        const ctx = cv.getContext("2d");
        ctx.drawImage(img, 0, 0);
        const sc = cv.width / 900;
        for (const iss of pinnedIssues) {
          const px = (iss.pinX / 100) * cv.width;
          const py = (iss.pinY / 100) * cv.height;
          drawPinOnCanvas(ctx, px, py, iss.seq, TC[iss.status] || "#ef4444", sc);
          // ID label badge
          const lx = px + 15*sc, ly = py - 26*sc;
          ctx.save();
          ctx.font = `bold ${Math.round(9*sc)}px monospace`;
          const tw = ctx.measureText(iss.defectId).width;
          ctx.fillStyle = "rgba(4,8,20,0.88)";
          ctx.fillRect(lx-3*sc, ly, tw+10*sc, 13*sc);
          ctx.strokeStyle = TC[iss.status]||"#ef4444"; ctx.lineWidth = 1.5*sc;
          ctx.strokeRect(lx-3*sc, ly, tw+10*sc, 13*sc);
          ctx.fillStyle = "#93c5fd"; ctx.textAlign="left"; ctx.textBaseline="top";
          ctx.fillText(iss.defectId, lx+2*sc, ly+1*sc);
          ctx.restore();
        }
        res(cv.toDataURL("image/jpeg", 0.88));
      } catch { res(imageData); }
    };
    img.onerror = () => res(imageData);
    img.src = imageData;
  });
}

/* Crop drawing around pin, overlay pin+badge, return jpeg dataUrl */
function buildCropThumb(imageData, pinX, pinY, seq, defectId, status) {
  return new Promise(res => {
    if (!imageData) { res(null); return; }
    const img = new Image();
    img.onload = () => {
      try {
        const iw = img.naturalWidth||800, ih = img.naturalHeight||600;
        const frac = 0.40;
        const cw=iw*frac, ch=ih*frac;
        const ox = Math.min(Math.max((pinX/100)*iw - cw/2, 0), iw-cw);
        const oy = Math.min(Math.max((pinY/100)*ih - ch/2, 0), ih-ch);
        const cv = document.createElement("canvas"); cv.width=420; cv.height=315;
        const ctx = cv.getContext("2d");
        ctx.drawImage(img, ox, oy, cw, ch, 0, 0, 420, 315);
        const px = ((pinX/100)*iw - ox)/cw*420;
        const py = ((pinY/100)*ih - oy)/ch*315;
        const sc = 420/600;
        drawPinOnCanvas(ctx, px, py, seq, TC[status]||"#ef4444", sc);
        const lx=px+14*sc, ly=py-26*sc;
        ctx.save();
        ctx.font=`bold ${Math.round(9*sc)}px monospace`;
        const tw=ctx.measureText(defectId).width;
        ctx.fillStyle="rgba(4,8,20,0.88)";
        ctx.fillRect(lx-3*sc, ly, tw+10*sc, 13*sc);
        ctx.strokeStyle=TC[status]||"#ef4444"; ctx.lineWidth=1.5*sc;
        ctx.strokeRect(lx-3*sc, ly, tw+10*sc, 13*sc);
        ctx.fillStyle="#93c5fd"; ctx.textAlign="left"; ctx.textBaseline="top";
        ctx.fillText(defectId, lx+2*sc, ly+1*sc);
        ctx.restore();
        res(cv.toDataURL("image/jpeg",0.85));
      } catch { res(null); }
    };
    img.onerror = () => res(null);
    img.src = imageData;
  });
}

async function generatePDF({ project, zoneId, zones, issues }) {
  const ML=12, MR=12, UW=210-ML-MR;
  const filteredZones = zoneId ? zones.filter(z=>z.id===zoneId) : zones;
  const totalIssues = issues.filter(i=>filteredZones.some(z=>z.id===i.zoneId)).length;

  const pages = [];    // finished canvas elements
  let ctx, yy;

  const newPage = () => {
    const cv = makeCanvas();
    pages.push(cv);
    ctx = pageCtx(cv);
    yy = 16;
  };
  const checkY = (need) => { if (yy + need > 283) newPage(); };

  // ── COVER ────────────────────────────────────────────
  newPage();
  pRect(ctx, 0, 0, 8, 297, "#1d4ed8");
  pRect(ctx, 0, 295, 210, 2, "#1d4ed8");
  pText(ctx, "DEFECT",     ML+14, 84,  { sz:18, bold:true, color:"#f8fafc" });
  pText(ctx, "INSPECTION", ML+14, 104, { sz:18, bold:true, color:"#f8fafc" });
  pText(ctx, "REPORT",     ML+14, 124, { sz:18, bold:true, color:"#f8fafc" });
  pLine(ctx, ML+14, 130, ML+130, 130, "#1d4ed8", 0.6);
  [
    ["Project",      project.name],
    ["Scope",        zoneId ? (filteredZones[0]?.name??"Unknown") : `All Zones (${filteredZones.length})`],
    ["Generated",    new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"})],
    ["Total Issues", String(totalIssues)],
  ].forEach(([k,v],i) => {
    pText(ctx, k, ML+14, 144+i*13, { sz:4.5, color:"#64748b" });
    pText(ctx, v, ML+50, 144+i*13, { sz:4.5, bold:true, color:"#e2e8f0" });
  });

  // ── PER ZONE ────────────────────────────────────────
  for (const zone of filteredZones) {
    const zoneIssues   = issues.filter(i=>i.zoneId===zone.id).sort((a,b)=>a.seq-b.seq);
    const zoneDrawings = zone.drawings ?? [];

    // Zone summary page
    newPage();
    pRect(ctx, 0, 0, 210, 14, "#1d4ed8");
    pText(ctx, `ZONE: ${zone.name.toUpperCase()}`, ML, 9.5, { sz:5.5, bold:true, color:"#fff" });
    pText(ctx, `Prefix: ${zonePrefix(zone.name)}  |  ${zoneIssues.length} issues`, 210-MR, 9.5, { sz:4, color:"#93c5fd", align:"right" });
    yy = 22;

    // Stat boxes
    const bw = (UW-9)/4;
    [{l:"TOTAL",v:zoneIssues.length,c:"#3b82f6"},
     {l:"OPEN",v:zoneIssues.filter(i=>i.status==="Open").length,c:"#ef4444"},
     {l:"IN PROGRESS",v:zoneIssues.filter(i=>i.status==="In Progress").length,c:"#f97316"},
     {l:"RESOLVED",v:zoneIssues.filter(i=>["Resolved","Closed"].includes(i.status)).length,c:"#22c55e"},
    ].forEach((s,i)=>{
      const bx=ML+i*(bw+3);
      pRect(ctx,bx,yy,bw,18,"#121c32");
      pText(ctx,String(s.v),bx+bw/2,yy+11,{sz:10,bold:true,color:s.c,align:"center"});
      pText(ctx,s.l,bx+bw/2,yy+16.5,{sz:3,color:"#64748b",align:"center"});
    });
    yy += 24;

    // ─ Drawing pages ──────────────────────────────────────
    for (const drw of zoneDrawings) {
      if (!drw.imageData) continue;
      const pinned = zoneIssues.filter(i=>i.drawingId===drw.id && i.pinX!=null);
      const annotated = await buildAnnotatedImage(drw.imageData, pinned);

      const aspect = await new Promise(r => {
        const t=new Image();
        t.onload = () => r((t.naturalHeight||600)/Math.max(t.naturalWidth||800,1));
        t.onerror = () => r(0.56);
        t.src = drw.imageData;
      });
      const imgH = Math.min(Math.max(UW*aspect, 55), 145);

      checkY(imgH + 30);
      pRect(ctx, ML, yy, UW, 8, "#121c32");
      pRect(ctx, ML, yy, 3, 8, "#1d4ed8");
      pText(ctx, `DRAWING: ${drw.name.toUpperCase()}  |  ${pinned.length} pin${pinned.length!==1?"s":""}`, ML+5, yy+5.5, { sz:3.8, bold:true, color:"#94a3b8" });
      yy += 10;
      await pImage(ctx, annotated, ML, yy, UW, imgH);
      pRect(ctx, ML, yy, UW, imgH, null, "#1d4ed8", 0.4);
      yy += imgH + 3;

      // Legend table
      if (pinned.length > 0) {
        checkY(7 + pinned.length * 7.5 + 4);
        pRect(ctx, ML, yy, UW, 7, "#18243c");
        [[ML+3,"#"],[ML+12,"Defect ID"],[ML+34,"Description"],[ML+110,"Severity"],[ML+138,"Status"],[ML+165,"Assignee"]]
          .forEach(([x,t]) => pText(ctx,t,x,yy+4.8,{sz:3.2,bold:true,color:"#64748b"}));
        yy += 7;
        pinned.forEach((iss,i) => {
          checkY(8);
          pRect(ctx, ML, yy, UW, 7.5, i%2===0?"#0d1426":"#111e36");
          pCircle(ctx, ML+4, yy+3.8, 2.5, TC[iss.status]||"#6b7280");
          pText(ctx,String(iss.seq),ML+4,yy+4.8,{sz:2.8,bold:true,color:"#fff",align:"center"});
          pText(ctx,iss.defectId||"",ML+12,yy+5,{sz:3.5,bold:true,color:"#60a5fa"});
          pText(ctx,(iss.description||"").slice(0,60),ML+34,yy+5,{sz:3.5,color:"#cbd5e1"});
          pText(ctx,iss.severity||"",ML+110,yy+5,{sz:3.5,color:SC[iss.severity]||"#94a3b8"});
          pText(ctx,iss.status||"",ML+138,yy+5,{sz:3.5,color:TC[iss.status]||"#94a3b8"});
          pText(ctx,(iss.assignee||"—").slice(0,16),ML+165,yy+5,{sz:3.5,color:"#94a3b8"});
          yy += 7.5;
        });
        yy += 4;
      }
    }

    // ─ Issue detail cards ────────────────────────────────
    if (zoneIssues.length === 0) continue;
    newPage();
    pRect(ctx, ML, yy, UW, 9, "#121c32");
    pRect(ctx, ML, yy, 4, 9, "#1d4ed8");
    pText(ctx, `ISSUE DETAILS — ${zone.name.toUpperCase()}`, ML+7, yy+6, {sz:4.5,bold:true,color:"#e2e8f0"});
    yy += 14;

    for (const iss of zoneIssues) {
      const CARD_H = 82;
      checkY(CARD_H + 6);

      pRect(ctx, ML, yy, UW, CARD_H, "#0d1426");
      pRect(ctx, ML, yy, UW, CARD_H, null, "#18283c", 0.35);
      pRect(ctx, ML, yy, 4, CARD_H, TC[iss.status]||"#6b7280");

      const CL=ML+7, cy0=yy+9;
      pText(ctx, iss.defectId||"", CL, cy0, {sz:6,bold:true,color:"#60a5fa"});

      // Status badge
      pRect(ctx, CL+32, cy0-5.5, 28, 6.5, TC[iss.status]||"#6b7280");
      pText(ctx, iss.status||"", CL+32+14, cy0-1.5, {sz:3,bold:true,color:"#fff",align:"center"});
      // Severity badge
      pRect(ctx, CL+62, cy0-5.5, 28, 6.5, SC[iss.severity]||"#6b7280");
      pText(ctx, iss.severity||"", CL+62+14, cy0-1.5, {sz:3,bold:true,color:"#fff",align:"center"});
      pText(ctx, `Date: ${iss.date||"—"}`, 210-MR-4, cy0-1.5, {sz:3.5,color:"#64748b",align:"right"});
      pLine(ctx, CL, cy0+2.5, 210-MR-4, cy0+2.5, "#18283c", 0.3);

      const ROW_Y=cy0+5, DW=66, DH=52, PW2=48, PH2=52;
      const PHOTO_X=CL+DW+4, TX=PHOTO_X+PW2+5, TW=UW-(TX-ML)-2;

      // Cropped drawing
      const issDrawing = zoneDrawings.find(d=>d.id===iss.drawingId);
      if (issDrawing?.imageData && iss.pinX!=null) {
        const thumb = await buildCropThumb(issDrawing.imageData, iss.pinX, iss.pinY, iss.seq, iss.defectId, iss.status);
        if (thumb) { await pImage(ctx, thumb, CL, ROW_Y, DW, DH); }
        pRect(ctx, CL, ROW_Y, DW, DH, null, "#1d4ed8", 0.5);
        pText(ctx, (issDrawing.name||"").slice(0,24), CL, ROW_Y+DH+3.5, {sz:2.9,color:"#475569"});
      } else {
        pRect(ctx, CL, ROW_Y, DW, DH, "#0a1020");
        pRect(ctx, CL, ROW_Y, DW, DH, null, "#18283c", 0.3);
        pText(ctx, "No pin placed", CL+DW/2, ROW_Y+DH/2, {sz:3.5,color:"#283750",align:"center"});
      }

      // Photo
      if (iss.photo) {
        await pImage(ctx, iss.photo, PHOTO_X, ROW_Y, PW2, PH2);
        pRect(ctx, PHOTO_X, ROW_Y, PW2, PH2, null, "#18283c", 0.3);
        pText(ctx, "Site photo", PHOTO_X, ROW_Y+PH2+3.5, {sz:2.9,color:"#475569"});
      } else {
        pRect(ctx, PHOTO_X, ROW_Y, PW2, PH2, "#0a1020");
        pRect(ctx, PHOTO_X, ROW_Y, PW2, PH2, null, "#18283c", 0.3);
        pText(ctx, "No photo", PHOTO_X+PW2/2, ROW_Y+PH2/2, {sz:3.5,color:"#283750",align:"center"});
      }

      // Text fields with word-wrap
      let dy = ROW_Y+1;
      const pField = (label, value) => {
        if (!value) return;
        pText(ctx, label.toUpperCase(), TX, dy, {sz:3,bold:true,color:"#41506e"}); dy+=4;
        const lines = wrapText(ctx, String(value).slice(0,200), 3.5, TW);
        lines.slice(0,5).forEach(ln => { pText(ctx,ln,TX,dy,{sz:3.5,color:"#cbd5e1"}); dy+=4.2; });
        dy+=1.5;
      };
      pField("Description", iss.description);
      pField("Location",    iss.location);
      pField("Assigned To", iss.assignee);
      pField("Notes",       iss.notes);

      yy += CARD_H + 5;
    }
    yy += 4;
  }

  const safeName = s=>(s||"").replace(/[^a-zA-Z0-9_-]/g,"_").slice(0,40);
  const fname=`${safeName(project.name)}_Defect_${zoneId?safeName(filteredZones[0]?.name):"AllZones"}.pdf`;
  buildPDF(pages, fname);
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [db,      setDb]      = useState(() => load() ?? { projects:[] });
  const [page,    setPage]    = useState("home");
  const [projId,  setProjId]  = useState(null);
  const [zoneId,  setZoneId]  = useState(null);
  const [issueId, setIssueId] = useState(null);
  const [modal,   setModal]   = useState(null);
  const [toast,   setToast]   = useState(null);
  const [pdfBusy, setPdfBusy] = useState(false);

  useEffect(() => { save(db); }, [db]);

  const flash = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const project   = db.projects.find(p => p.id === projId);
  const zones     = project?.zones   ?? [];
  const zone      = zones.find(z => z.id === zoneId);
  const allIssues = project?.issues  ?? [];
  const zIssues   = allIssues.filter(i => i.zoneId === zoneId);
  const issue     = allIssues.find(i => i.id === issueId);

  const mutP = (id, fn) => setDb(d => ({ ...d, projects: d.projects.map(p => p.id===id ? fn(p) : p) }));

  const addProject  = name => { setDb(d => ({ ...d, projects: [...d.projects, { id:uid(), name, zones:[], issues:[], createdAt:today() }] })); flash(`Project "${name}" created`); };
  const addZone     = name => { mutP(projId, p => ({ ...p, zones: [...p.zones, { id:uid(), name, drawings:[], createdAt:today() }] })); flash(`Zone "${name}" added`); };
  const addDrawing  = (name, imageData) => { mutP(projId, p => ({ ...p, zones: p.zones.map(z => z.id===zoneId ? { ...z, drawings: [...(z.drawings??[]), { id:uid(), name, imageData, zoneId, createdAt:today() }] } : z) })); flash(`Drawing "${name}" uploaded`); };
  const addIssue    = fields => { const { prefix,seq,defectId } = nextId(allIssues, zone.name); const iss = { id:uid(), prefix,seq,defectId, zoneId, date:today(), status:"Open", ...fields }; mutP(projId, p => ({ ...p, issues: [...(p.issues??[]), iss] })); flash(`Issue ${defectId} created`); return iss; };
  const updateIssue = (id, fields) => mutP(projId, p => ({ ...p, issues: p.issues.map(i => i.id===id ? {...i,...fields} : i) }));
  const deleteIssue = id => { mutP(projId, p => ({ ...p, issues: p.issues.filter(i => i.id!==id) })); flash("Issue deleted","err"); };
  const placePin    = (id, pinX, pinY, drawingId) => { updateIssue(id, { pinX, pinY, drawingId }); flash("Pin saved ✓"); };
  const deleteProject = id => { setDb(d => ({ ...d, projects: d.projects.filter(p => p.id!==id) })); flash("Project deleted","err"); };

  const goHome    = ()  => { setPage("home");    setProjId(null); setZoneId(null); };
  const goProject = id  => { setProjId(id);      setPage("project"); setZoneId(null); };
  const goZone    = id  => { setZoneId(id);      setPage("zone"); };
  const goIssue   = id  => { setIssueId(id);     setPage("issue"); };

  const doPdf = async zid => {
    setPdfBusy(true);
    try { await generatePDF({ project, zoneId: zid, zones, issues: allIssues }); flash("PDF exported ✓"); }
    catch(e) { flash("PDF error: "+e.message, "err"); }
    finally { setPdfBusy(false); }
  };

  return (
    <div style={{ fontFamily:"'IBM Plex Sans','Segoe UI',sans-serif", background:"#080f1e", minHeight:"100vh", color:"#e2e8f0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0d1626}::-webkit-scrollbar-thumb{background:#1e3358;border-radius:3px}
        input,textarea,select,button{font-family:'IBM Plex Sans',sans-serif}
        .card{background:#0d1626;border:1px solid #1e3358;border-radius:12px}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all .14s}
        .btn-blue{background:#1d4ed8;color:#fff}.btn-blue:hover{background:#1e40af}
        .btn-ghost{background:transparent;color:#64748b;border:1px solid #1e3358}.btn-ghost:hover{background:#0d1626;color:#e2e8f0;border-color:#3b82f6}
        .btn-red{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}.btn-red:hover{background:#7f1d1d}
        .btn-green{background:#052e16;color:#86efac;border:1px solid #14532d}.btn-green:hover{background:#14532d}
        .inp{background:#040c1a;border:1px solid #1e3358;border-radius:7px;padding:9px 12px;color:#e2e8f0;font-size:13px;width:100%;outline:none;transition:border .14s}
        .inp:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
        .lbl{font-size:10.5px;font-weight:700;color:#2563eb;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;display:block}
        .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:flex-end;justify-content:center}
        .modal{background:#0d1626;border:1px solid #1e3358;border-radius:18px 18px 0 0;width:100%;max-width:660px;max-height:93vh;overflow-y:auto;padding:22px 20px}
        @media(min-width:640px){.modal-bg{align-items:center}.modal{border-radius:14px}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .anim{animation:fadeUp .22s ease}
        .hov:hover{background:#0f1e38 !important;border-color:#3b82f655 !important}
        .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:#0d1626;border:1px solid #1e3358;font-size:12px;font-weight:600;color:#60a5fa;cursor:pointer;transition:all .13s;white-space:nowrap}
        .chip:hover{border-color:#3b82f6;background:#1e3358}
        .mono{font-family:'IBM Plex Mono',monospace}
      `}</style>

      {/* NAV */}
      <nav style={{ background:"#040c1a", borderBottom:"1px solid #1e3358", position:"sticky", top:0, zIndex:100, padding:"0 16px" }}>
        <div style={{ maxWidth:980, margin:"0 auto", height:50, display:"flex", alignItems:"center", gap:6 }}>
          <span className="mono" style={{ fontWeight:700, fontSize:15, cursor:"pointer" }} onClick={goHome}>
            <span style={{ color:"#1d4ed8" }}>◈</span><span style={{ color:"#e2e8f0" }}> Defect</span><span style={{ color:"#3b82f6" }}>Inspector</span>
          </span>
          <div style={{ flex:1, display:"flex", alignItems:"center", gap:3, overflowX:"auto", padding:"0 6px" }}>
            {project && <><span style={{ color:"#1e3358" }}>›</span><button className="chip" onClick={()=>goProject(projId)}>{project.name}</button></>}
            {zone    && <><span style={{ color:"#1e3358" }}>›</span><button className="chip" onClick={()=>goZone(zoneId)}>{zone.name}</button></>}
            {issue   && <><span style={{ color:"#1e3358" }}>›</span><span className="mono" style={{ fontSize:12,color:"#60a5fa",fontWeight:600 }}>{issue.defectId}</span></>}
          </div>
          {project && (
            <button className="btn btn-green" style={{ fontSize:12, padding:"5px 12px" }} disabled={pdfBusy} onClick={()=>setModal({type:"report"})}>
              {pdfBusy ? "⏳ Building…" : "⬇ PDF"}
            </button>
          )}
        </div>
      </nav>

      {/* PAGES */}
      <div style={{ maxWidth:980, margin:"0 auto", padding:"20px 14px" }}>
        {page==="home"    && <HomePage    projects={db.projects} onSelect={goProject} onAdd={()=>setModal({type:"newProject"})} onDelete={deleteProject} />}
        {page==="project" && project      && <ProjectPage project={project} zones={zones} issues={allIssues} onZone={goZone} onAddZone={()=>setModal({type:"newZone"})} />}
        {page==="zone"    && zone         && <ZonePage zone={zone} issues={zIssues} onIssue={goIssue} onAddIssue={()=>setModal({type:"newIssue"})} onAddDrawing={()=>setModal({type:"newDrawing"})} onStatusChange={(id,s)=>updateIssue(id,{status:s})} onPin={placePin} />}
        {page==="issue"   && issue && zone && <IssuePage issue={issue} zone={zone} drawings={zone.drawings??[]} onEdit={f=>{updateIssue(issue.id,f);flash("Saved");}} onDelete={()=>{deleteIssue(issue.id);setPage("zone");}} onBack={()=>setPage("zone")} onPin={placePin} onStatusChange={s=>updateIssue(issue.id,{status:s})} />}
      </div>

      {/* MODALS */}
      {modal?.type==="newProject" && <TextModal   title="New Project"  hint='e.g. "Marina Tower Block A"'     placeholder="Project name"  onClose={()=>setModal(null)} onSave={v=>{addProject(v);setModal(null);}} />}
      {modal?.type==="newZone"    && <TextModal   title="New Zone"     hint={`"Zone A"→ZA  "Lobby"→LO  "Block B"→BB`} placeholder="Zone name" onClose={()=>setModal(null)} onSave={v=>{addZone(v);setModal(null);}} />}
      {modal?.type==="newDrawing" && <DrawingModal onClose={()=>setModal(null)} onSave={(n,img)=>{addDrawing(n,img);setModal(null);}} />}
      {modal?.type==="newIssue"   && <IssueModal  title="New Issue" drawings={zone?.drawings??[]} onClose={()=>setModal(null)} onSave={f=>{addIssue(f);setModal(null);}} />}
      {modal?.type==="report"     && <ReportModal zones={zones} onClose={()=>setModal(null)} onGenerate={async zid=>{setModal(null);await doPdf(zid||null);}} />}

      {/* TOAST */}
      {toast && (
        <div style={{ position:"fixed", bottom:22, left:"50%", transform:"translateX(-50%)", background:toast.type==="err"?"#450a0a":"#052e16", color:toast.type==="err"?"#fca5a5":"#86efac", border:`1px solid ${toast.type==="err"?"#7f1d1d":"#14532d"}`, padding:"9px 20px", borderRadius:9, fontWeight:600, fontSize:13, zIndex:300, boxShadow:"0 4px 24px rgba(0,0,0,.6)", whiteSpace:"nowrap" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════ HOME ═══════════════════════════════════ */
function HomePage({ projects, onSelect, onAdd, onDelete }) {
  return (
    <div className="anim">
      <div style={{ display:"flex", alignItems:"center", marginBottom:20 }}>
        <div><h1 style={{ fontSize:20,fontWeight:700 }}>Projects</h1><p style={{ color:"#475569",fontSize:12,marginTop:2 }}>{projects.length} project{projects.length!==1?"s":""}</p></div>
        <button className="btn btn-blue" style={{ marginLeft:"auto" }} onClick={onAdd}>+ New Project</button>
      </div>
      {projects.length===0 ? (
        <div className="card" style={{ padding:52,textAlign:"center" }}>
          <div style={{ fontSize:44,marginBottom:12 }}>🏗️</div>
          <p style={{ color:"#475569",marginBottom:16 }}>No projects yet.</p>
          <button className="btn btn-blue" onClick={onAdd}>Create First Project</button>
        </div>
      ) : projects.map(p=>(
        <div key={p.id} className="card hov" style={{ padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"all .14s" }} onClick={()=>onSelect(p.id)}>
          <div style={{ width:38,height:38,borderRadius:9,background:"#0f2b50",border:"1px solid #1d4ed8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0 }}>🏢</div>
          <div style={{ flex:1,minWidth:0 }}>
            <div style={{ fontWeight:600,fontSize:14 }}>{p.name}</div>
            <div style={{ color:"#475569",fontSize:11,marginTop:1 }}>{(p.zones||[]).length} zones · {(p.issues||[]).length} issues · {p.createdAt}</div>
          </div>
          <button className="btn btn-red" style={{ fontSize:11,padding:"4px 9px" }} onClick={e=>{e.stopPropagation();if(confirm("Delete project?"))onDelete(p.id);}}>✕</button>
          <span style={{ color:"#1e3358" }}>›</span>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════ PROJECT ════════════════════════════════ */
function ProjectPage({ project, zones, issues, onZone, onAddZone }) {
  const stats=[{l:"Total",v:issues.length,c:"#3b82f6"},{l:"Open",v:issues.filter(i=>i.status==="Open").length,c:"#ef4444"},{l:"In Progress",v:issues.filter(i=>i.status==="In Progress").length,c:"#f97316"},{l:"Resolved",v:issues.filter(i=>["Resolved","Closed"].includes(i.status)).length,c:"#22c55e"}];
  return (
    <div className="anim">
      <div style={{ display:"flex",alignItems:"flex-start",gap:10,marginBottom:18 }}>
        <div><h1 style={{ fontSize:18,fontWeight:700 }}>{project.name}</h1><p style={{ color:"#475569",fontSize:12,marginTop:2 }}>{zones.length} zones · {issues.length} issues</p></div>
        <button className="btn btn-blue" style={{ marginLeft:"auto" }} onClick={onAddZone}>+ Zone</button>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:18 }}>
        {stats.map(s=><div key={s.l} className="card" style={{ padding:"12px 10px",textAlign:"center" }}><div className="mono" style={{ fontSize:22,fontWeight:700,color:s.c }}>{s.v}</div><div style={{ fontSize:10,color:"#475569",marginTop:3,textTransform:"uppercase",letterSpacing:".05em",fontWeight:600 }}>{s.l}</div></div>)}
      </div>
      <p style={{ fontSize:10,color:"#2563eb",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8 }}>Zones</p>
      {zones.length===0 ? <div className="card" style={{ padding:30,textAlign:"center" }}><p style={{ color:"#475569" }}>No zones yet.</p></div>
        : zones.map(z=>{const zi=issues.filter(i=>i.zoneId===z.id);const open=zi.filter(i=>i.status==="Open").length;return(
          <div key={z.id} className="card hov" style={{ padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10,cursor:"pointer",transition:"all .14s" }} onClick={()=>onZone(z.id)}>
            <div className="mono" style={{ width:36,height:36,borderRadius:8,background:"#0f2b50",border:"1px solid #1d4ed8",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,color:"#60a5fa",flexShrink:0 }}>{zonePrefix(z.name)}</div>
            <div style={{ flex:1 }}><div style={{ fontWeight:600 }}>{z.name}</div><div style={{ color:"#475569",fontSize:11,marginTop:1 }}>{(z.drawings||[]).length} drawings · {zi.length} issues</div></div>
            {open>0&&<span className="badge" style={{ background:"#450a0a",color:"#fca5a5",border:"1px solid #7f1d1d" }}>{open} open</span>}
            <span style={{ color:"#1e3358" }}>›</span>
          </div>);})}
    </div>
  );
}

/* ═══════════════════ ZONE ═══════════════════════════════════ */
function ZonePage({ zone, issues, onIssue, onAddIssue, onAddDrawing, onStatusChange, onPin }) {
  const [tab, setTab]         = useState("map");
  const [activeDid, setActiveDid] = useState(null);
  const [pinMode, setPinMode] = useState(null);

  const drawings  = zone.drawings ?? [];
  const curDrw    = drawings.find(d=>d.id===activeDid) ?? drawings[0] ?? null;
  const drwIssues = curDrw ? issues.filter(i=>i.drawingId===curDrw.id) : [];
  const unpinned  = issues.filter(i=>i.pinX==null);

  const handlePinPlace = (issId, x, y) => {
    if (!curDrw) return;
    onPin(issId, x, y, curDrw.id);
    setPinMode(null);
  };

  return (
    <div className="anim">
      <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:14 }}>
        <div style={{ flex:1 }}>
          <h1 style={{ fontSize:17,fontWeight:700 }}>{zone.name}</h1>
          <p style={{ color:"#475569",fontSize:11,marginTop:2 }}>
            Prefix <span className="mono" style={{ color:"#60a5fa",fontWeight:700 }}>{zonePrefix(zone.name)}</span>
            {" · "}{issues.length} issue{issues.length!==1?"s":""}
            {unpinned.length>0 && <span style={{ color:"#f97316" }}> · {unpinned.length} unplaced</span>}
          </p>
        </div>
        <button className="btn btn-ghost" style={{ fontSize:12,padding:"5px 10px" }} onClick={onAddDrawing}>+ Drawing</button>
        <button className="btn btn-blue"  style={{ fontSize:12,padding:"5px 10px" }} onClick={onAddIssue}>+ Issue</button>
      </div>

      <div style={{ display:"flex",gap:2,background:"#040c1a",borderRadius:8,padding:3,width:"fit-content",marginBottom:12,border:"1px solid #1e3358" }}>
        {["map","list"].map(t=>(
          <button key={t} onClick={()=>{setTab(t);setPinMode(null);}}
            style={{ padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:t===tab?"#1d4ed8":"transparent",color:t===tab?"#fff":"#475569",transition:"all .14s" }}>
            {t==="map"?"🗺 Drawing Map":"☰ Issue List"}
          </button>
        ))}
      </div>

      {tab==="map" && (<>
        {drawings.length>0 && (
          <div style={{ display:"flex",gap:5,marginBottom:8,overflowX:"auto",paddingBottom:3 }}>
            {drawings.map(d=>(
              <button key={d.id} onClick={()=>{setActiveDid(d.id);setPinMode(null);}}
                style={{ flexShrink:0,padding:"4px 11px",borderRadius:6,border:`1px solid ${curDrw?.id===d.id?"#3b82f6":"#1e3358"}`,background:curDrw?.id===d.id?"#1d4ed815":"transparent",color:curDrw?.id===d.id?"#60a5fa":"#475569",fontSize:11,fontWeight:600,cursor:"pointer" }}>
                {d.name}
              </button>
            ))}
          </div>
        )}
        {!curDrw ? (
          <div className="card" style={{ padding:44,textAlign:"center" }}>
            <div style={{ fontSize:36,marginBottom:10 }}>🗺️</div>
            <p style={{ color:"#475569",marginBottom:14 }}>Upload a site drawing to start pinning defects.</p>
            <button className="btn btn-blue" onClick={onAddDrawing}>Upload Drawing</button>
          </div>
        ) : (
          <DrawingCanvas drawing={curDrw} issues={drwIssues} allIssues={issues} pinMode={pinMode}
            onPinPlace={handlePinPlace} onIssueClick={onIssue}
            onStartPin={id=>setPinMode(id)} onCancelPin={()=>setPinMode(null)} />
        )}

        {issues.length>0 && (
          <div style={{ marginTop:14 }}>
            <p style={{ fontSize:10,color:"#2563eb",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8 }}>
              {pinMode ? `📌 Click drawing above to place pin for ${issues.find(i=>i.id===pinMode)?.defectId}` : "All Zone Issues"}
            </p>
            {issues.map(iss=>(
              <IssueRow key={iss.id} issue={iss} active={pinMode===iss.id}
                onClick={()=>{ if(!pinMode) onIssue(iss.id); }}
                onStatus={s=>onStatusChange(iss.id,s)}
                onPin={()=>{ if(!curDrw){alert("Upload a drawing first.");return;} setPinMode(iss.id); setTab("map"); }}
              />
            ))}
          </div>
        )}
      </>)}

      {tab==="list" && (
        <div>
          {issues.length===0
            ? <div className="card" style={{ padding:30,textAlign:"center" }}><p style={{ color:"#475569" }}>No issues yet.</p></div>
            : [...issues].sort((a,b)=>a.seq-b.seq).map(iss=>(
                <IssueRow key={iss.id} issue={iss} active={false}
                  onClick={()=>onIssue(iss.id)}
                  onStatus={s=>onStatusChange(iss.id,s)}
                  onPin={()=>{ if(!curDrw){alert("Upload a drawing first.");return;} setActiveDid(curDrw?.id); setTab("map"); setPinMode(iss.id); }}
                />
              ))
          }
        </div>
      )}
    </div>
  );
}

/* ═══════════════════ DRAWING CANVAS ════════════════════════ */
function DrawingCanvas({ drawing, issues, allIssues, pinMode, onPinPlace, onIssueClick, onStartPin, onCancelPin }) {
  const [hovered, setHovered] = useState(null);
  const [cursor,  setCursor]  = useState(null);
  const imgRef = useRef();
  const pinningIssue = pinMode ? allIssues.find(i=>i.id===pinMode) : null;
  const pinned = issues.filter(i=>i.pinX!=null);

  useEffect(() => { setCursor(null); }, [pinMode]);

  const getXY = (cx,cy) => {
    const rect = imgRef.current.getBoundingClientRect();
    return {
      x: Math.round(Math.max(0,Math.min(100,((cx-rect.left)/rect.width)*100))*10)/10,
      y: Math.round(Math.max(0,Math.min(100,((cy-rect.top)/rect.height)*100))*10)/10,
    };
  };

  return (
    <div>
      {pinMode && (
        <div style={{ background:"#0f2b50",border:"1px solid #1d4ed8",borderRadius:8,padding:"8px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10 }}>
          <span style={{ fontSize:18 }}>📌</span>
          <span style={{ fontSize:13,color:"#93c5fd",fontWeight:600 }}>
            Click the drawing to place pin for <span className="mono" style={{ color:"#60a5fa" }}>{pinningIssue?.defectId}</span>
          </span>
          <button className="btn btn-ghost" style={{ marginLeft:"auto",fontSize:12,padding:"4px 10px" }} onClick={onCancelPin}>Cancel</button>
        </div>
      )}

      <div className="card" style={{ position:"relative",overflow:"hidden",cursor:pinMode?"crosshair":"default" }}>
        <img ref={imgRef} src={drawing.imageData} alt={drawing.name}
          style={{ width:"100%",display:"block",maxHeight:500,objectFit:"contain",background:"#04080f",userSelect:"none" }}
          onClick={e=>{ if(!pinMode) return; const p=getXY(e.clientX,e.clientY); onPinPlace(pinMode,p.x,p.y); }}
          onMouseMove={e=>{ if(!pinMode) return; setCursor(getXY(e.clientX,e.clientY)); }}
          onMouseLeave={()=>setCursor(null)}
          onTouchEnd={e=>{ if(!pinMode) return; e.preventDefault(); const t=e.changedTouches[0]; const p=getXY(t.clientX,t.clientY); onPinPlace(pinMode,p.x,p.y); }}
          draggable={false}
        />

        {/* Existing pins with labels */}
        {pinned.map(iss=>(
          <PinMarker key={iss.id} issue={iss} hovered={hovered===iss.id}
            dimmed={!!pinMode && pinMode!==iss.id}
            onEnter={()=>!pinMode&&setHovered(iss.id)}
            onLeave={()=>setHovered(null)}
            onClick={()=>!pinMode&&onIssueClick(iss.id)} />
        ))}

        {/* Live cursor preview pin */}
        {pinMode && cursor && (
          <div style={{ position:"absolute",left:`${cursor.x}%`,top:`${cursor.y}%`,transform:"translate(-50%,-100%)",pointerEvents:"none",opacity:.72 }}>
            <svg width="30" height="38" viewBox="0 0 30 38" style={{ filter:"drop-shadow(0 2px 6px #1d4ed8)" }}>
              <path d="M15 0C7 0 0 7 0 15C0 23 15 38 15 38S30 23 30 15C30 7 23 0 15 0Z" fill="#3b82f6" stroke="white" strokeWidth="2"/>
              <text x="15" y="18" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold" fontFamily="monospace">{pinningIssue?.seq}</text>
            </svg>
          </div>
        )}

        {/* Instruction overlay when no pins */}
        {!pinMode && pinned.length===0 && (
          <div style={{ position:"absolute",bottom:10,right:10,background:"rgba(4,12,26,.9)",borderRadius:7,padding:"5px 11px",fontSize:11,color:"#475569",border:"1px solid #1e3358" }}>
            Click 📌 on an issue below to pin it here
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Inline pin canvas ──────────────────────────────────────── */
function InlinePinCanvas({ drawing, issue, onPin }) {
  const [temp, setTemp] = useState(null);
  const ref = useRef();
  const getXY = (cx,cy) => {
    const rect=ref.current.getBoundingClientRect();
    return { x:Math.round(Math.max(0,Math.min(100,((cx-rect.left)/rect.width)*100))*10)/10, y:Math.round(Math.max(0,Math.min(100,((cy-rect.top)/rect.height)*100))*10)/10 };
  };
  return (
    <div style={{ position:"relative",border:"2px dashed #1d4ed8",borderRadius:8,overflow:"hidden",cursor:"crosshair",background:"#04080f",marginBottom:10 }}>
      <img ref={ref} src={drawing.imageData} alt={drawing.name} style={{ width:"100%",display:"block",maxHeight:380,objectFit:"contain",userSelect:"none" }}
        onClick={e=>{ const p=getXY(e.clientX,e.clientY); onPin(p.x,p.y); }}
        onMouseMove={e=>setTemp(getXY(e.clientX,e.clientY))}
        onMouseLeave={()=>setTemp(null)}
        onTouchEnd={e=>{ e.preventDefault(); const t=e.changedTouches[0]; const p=getXY(t.clientX,t.clientY); onPin(p.x,p.y); }}
        draggable={false}
      />
      {temp && (
        <div style={{ position:"absolute",left:`${temp.x}%`,top:`${temp.y}%`,transform:"translate(-50%,-100%)",pointerEvents:"none",opacity:.75 }}>
          <svg width="30" height="38" viewBox="0 0 30 38">
            <path d="M15 0C7 0 0 7 0 15C0 23 15 38 15 38S30 23 30 15C30 7 23 0 15 0Z" fill="#3b82f6" stroke="white" strokeWidth="2"/>
            <text x="15" y="18" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold" fontFamily="monospace">{issue.seq}</text>
          </svg>
        </div>
      )}
      {!temp && <div style={{ position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none" }}><div style={{ background:"rgba(4,12,26,.82)",borderRadius:8,padding:"8px 16px",border:"1px solid #1e3358",fontSize:13,color:"#60a5fa",fontWeight:600 }}>👆 Click / tap to place pin</div></div>}
    </div>
  );
}

function DrawingModal({ onClose, onSave }) {
  const [name,setName]=useState(""); const [img,setImg]=useState(null); const [busy,setBusy]=useState(false); const [err,setErr]=useState(""); const bgRef=useRef();
  const handleFile=async e=>{ const file=e.target.files[0]; if(!file)return; if(!file.type.startsWith("image/")){setErr("Please choose an image.");return;} setBusy(true);setErr(""); try{const raw=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.onerror=rej;r.readAsDataURL(file);}); setImg(await compressImage(raw));}catch{setErr("Could not read image.");}finally{setBusy(false);}};
  const canSave=name.trim()&&img&&!busy;
  return (
    <div className="modal-bg" ref={bgRef} onClick={e=>{if(e.target===bgRef.current)onClose();}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",alignItems:"center",marginBottom:14 }}>
          <h2 style={{ fontSize:15,fontWeight:700 }}>Upload Drawing</h2>
          <button className="btn btn-ghost" style={{ marginLeft:"auto",padding:"3px 9px",fontSize:12 }} onClick={onClose}>✕</button>
        </div>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <div><label className="lbl">Drawing Name</label><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Level 3 Floor Plan" autoFocus/></div>
          <div>
            <label className="lbl">Image (JPG / PNG)</label>
            <label style={{ display:"block",border:"2px dashed #1e3358",borderRadius:9,padding:"18px 14px",textAlign:"center",cursor:"pointer",background:"#040c1a",transition:"border-color .14s" }} onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e3358"}>
              <input type="file" accept="image/*" onChange={handleFile} onClick={e=>e.stopPropagation()} style={{ display:"none" }}/>
              {busy?<span style={{ color:"#60a5fa" }}>⏳ Processing…</span>:img?<span style={{ color:"#86efac" }}>✓ Ready — tap to replace</span>:<span style={{ color:"#475569" }}>📂 Tap to choose file</span>}
            </label>
            {err&&<p style={{ color:"#fca5a5",fontSize:12,marginTop:5 }}>⚠ {err}</p>}
            {img&&!busy&&<img src={img} alt="preview" style={{ marginTop:9,borderRadius:7,width:"100%",maxHeight:200,objectFit:"contain",background:"#040c1a",border:"1px solid #1e3358" }}/>}
          </div>
        </div>
        <div style={{ display:"flex",gap:7,marginTop:16,justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-blue" style={{ opacity:canSave?1:.4,cursor:canSave?"pointer":"not-allowed" }} onClick={()=>canSave&&onSave(name.trim(),img)}>{busy?"Processing…":"Upload"}</button>
        </div>
      </div>
    </div>
  );
}

/* ── CameraCapture ─────────────────────────────────────────────
   Live viewfinder using getUserMedia. Captures a frame on button
   press and returns a compressed JPEG dataUrl via onCapture().
──────────────────────────────────────────────────────────────*/
function CameraCapture({ onCapture, onClose }) {
  const videoRef  = useRef();
  const streamRef = useRef();
  const [ready,   setReady]   = useState(false);
  const [err,     setErr]     = useState("");
  const [facing,  setFacing]  = useState("environment"); // rear cam default
  const [flash,   setFlash]   = useState(false);         // shutter flash
  const isSecure = location.protocol === "https:" || location.hostname === "localhost";

  const startStream = useCallback(async (facingMode) => {
    if (!isSecure) { setErr("Camera requires HTTPS. Use a secure connection or localhost."); return; }
    // Stop any existing stream first
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setReady(false); setErr("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false,
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.onloadedmetadata = () => { videoRef.current.play(); setReady(true); };
      }
    } catch (e) {
      setErr(e.name === "NotAllowedError"
        ? "Camera permission denied. Please allow camera access and try again."
        : "Could not open camera: " + e.message);
    }
  }, []);

  useEffect(() => {
    startStream(facing);
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const flipCamera = () => {
    const next = facing === "environment" ? "user" : "environment";
    setFacing(next);
    startStream(next);
  };

  const shoot = async () => {
    if (!videoRef.current || !ready) return;
    setFlash(true);
    setTimeout(() => setFlash(false), 180);
    const v = videoRef.current;
    const cv = document.createElement("canvas");
    cv.width = v.videoWidth; cv.height = v.videoHeight;
    cv.getContext("2d").drawImage(v, 0, 0);
    const compressed = await compressImage(cv.toDataURL("image/jpeg", 0.92), 1400, 0.82);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onCapture(compressed);
  };

  return (
    <div style={{ position:"fixed",inset:0,zIndex:9999,background:"#000",display:"flex",flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"rgba(0,0,0,.7)",flexShrink:0 }}>
        <span style={{ color:"#93c5fd",fontWeight:700,fontSize:14 }}>📷 Take Photo</span>
        <button onClick={onClose} style={{ background:"none",border:"none",color:"#94a3b8",fontSize:22,cursor:"pointer",lineHeight:1 }}>✕</button>
      </div>

      {/* Viewfinder */}
      <div style={{ flex:1,position:"relative",overflow:"hidden",background:"#000" }}>
        <video ref={videoRef} playsInline muted
          style={{ width:"100%",height:"100%",objectFit:"cover",display:"block" }}/>
        {/* Shutter flash overlay */}
        {flash && <div style={{ position:"absolute",inset:0,background:"#fff",opacity:.65,pointerEvents:"none" }}/>}
        {/* Grid overlay */}
        {ready && (
          <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",opacity:.2 }}>
            <line x1="33.3%" y1="0" x2="33.3%" y2="100%" stroke="#fff" strokeWidth="1"/>
            <line x1="66.6%" y1="0" x2="66.6%" y2="100%" stroke="#fff" strokeWidth="1"/>
            <line x1="0" y1="33.3%" x2="100%" y2="33.3%" stroke="#fff" strokeWidth="1"/>
            <line x1="0" y1="66.6%" x2="100%" y2="66.6%" stroke="#fff" strokeWidth="1"/>
          </svg>
        )}
        {!ready && !err && (
          <div style={{ position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center" }}>
            <span style={{ color:"#60a5fa",fontSize:14 }}>⏳ Starting camera…</span>
          </div>
        )}
        {err && (
          <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,gap:12 }}>
            <p style={{ color:"#fca5a5",fontSize:13,textAlign:"center" }}>⚠ {err}</p>
            <button className="btn btn-blue" style={{ padding:"6px 14px",fontSize:12 }} onClick={()=>startStream(facing)}>Retry</button>
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-around",padding:"18px 32px 28px",background:"rgba(0,0,0,.85)",flexShrink:0 }}>
        {/* Flip button */}
        <button onClick={flipCamera} title="Flip camera"
          style={{ background:"rgba(255,255,255,.12)",border:"none",borderRadius:"50%",width:48,height:48,fontSize:22,cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center" }}>
          🔄
        </button>
        {/* Shutter */}
        <button onClick={shoot} disabled={!ready}
          style={{ width:72,height:72,borderRadius:"50%",border:"4px solid #fff",background:ready?"#fff":"#4b5563",cursor:ready?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",transition:"transform .1s",transform:flash?"scale(.92)":"scale(1)" }}>
          <div style={{ width:58,height:58,borderRadius:"50%",background:ready?"#1d4ed8":"#374151" }}/>
        </button>
        {/* Cancel */}
        <button onClick={onClose}
          style={{ background:"rgba(255,255,255,.12)",border:"none",borderRadius:"50%",width:48,height:48,fontSize:14,cursor:"pointer",color:"#fff",fontWeight:700 }}>
          ✕
        </button>
      </div>
    </div>
  );
}

function IssueModal({ title, issue, drawings, onClose, onSave, inline }) {
  const [f,setF]      = useState({ description:issue?.description||"", severity:issue?.severity||"High", status:issue?.status||"Open", location:issue?.location||"", assignee:issue?.assignee||"", notes:issue?.notes||"", drawingId:issue?.drawingId||drawings[0]?.id||"", photo:issue?.photo||null });
  const [showCam, setShowCam] = useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const bgRef=useRef();
  const fileRef=useRef();

  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    const raw = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=ev=>res(ev.target.result); r.onerror=rej; r.readAsDataURL(file); });
    set("photo", await compressImage(raw, 1200, .82));
    e.target.value = "";
  };

  const handleCapture = (dataUrl) => { set("photo", dataUrl); setShowCam(false); };

  const photoSection = (
    <div>
      <label className="lbl">Photo</label>
      {/* Buttons row */}
      <div style={{ display:"flex",gap:8,marginBottom:f.photo?8:0 }}>
        {/* Camera button */}
        <button type="button" onClick={()=>setShowCam(true)}
          style={{ flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"10px 0",background:"#0f172a",border:"1.5px solid #1e3358",borderRadius:9,color:"#93c5fd",fontSize:13,fontWeight:600,cursor:"pointer" }}>
          📷 Camera
        </button>
        {/* Gallery / file button */}
        <button type="button" onClick={()=>fileRef.current?.click()}
          style={{ flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"10px 0",background:"#0f172a",border:"1.5px solid #1e3358",borderRadius:9,color:"#93c5fd",fontSize:13,fontWeight:600,cursor:"pointer" }}>
          🖼 Gallery
        </button>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }}/>
      </div>
      {/* Preview */}
      {f.photo && (
        <div style={{ position:"relative" }}>
          <img src={f.photo} alt="preview" style={{ borderRadius:9,width:"100%",maxHeight:180,objectFit:"cover",border:"1px solid #1e3358",display:"block" }}/>
          <button onClick={()=>set("photo",null)}
            style={{ position:"absolute",top:6,right:6,background:"rgba(0,0,0,.7)",border:"none",borderRadius:"50%",width:26,height:26,color:"#fca5a5",cursor:"pointer",fontSize:14,lineHeight:"26px",textAlign:"center" }}>
            ✕
          </button>
        </div>
      )}
    </div>
  );

  const form=(
    <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
      <div><label className="lbl">Description *</label><textarea className="inp" rows={3} value={f.description} onChange={e=>set("description",e.target.value)} placeholder="Describe the defect…" style={{ resize:"vertical" }}/></div>
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
        <div><label className="lbl">Severity</label><select className="inp" value={f.severity} onChange={e=>set("severity",e.target.value)}>{SEVERITY.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><label className="lbl">Status</label><select className="inp" value={f.status} onChange={e=>set("status",e.target.value)}>{STATUS.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      {drawings.length>0&&<div><label className="lbl">Drawing</label><select className="inp" value={f.drawingId} onChange={e=>set("drawingId",e.target.value)}><option value="">— None —</option>{drawings.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>}
      <div><label className="lbl">Location Notes</label><input className="inp" value={f.location} onChange={e=>set("location",e.target.value)} placeholder="e.g. North wall, 2nd floor"/></div>
      <div><label className="lbl">Assigned To</label><input className="inp" value={f.assignee} onChange={e=>set("assignee",e.target.value)} placeholder="Inspector / Contractor"/></div>
      <div><label className="lbl">Notes</label><textarea className="inp" rows={2} value={f.notes} onChange={e=>set("notes",e.target.value)} style={{ resize:"vertical" }} placeholder="Follow-up notes…"/></div>
      {photoSection}
    </div>
  );

  return (
    <>
      {showCam && <CameraCapture onCapture={handleCapture} onClose={()=>setShowCam(false)}/>}
      {inline
        ? <div>{form}<div style={{ display:"flex",gap:7,marginTop:14,justifyContent:"flex-end" }}><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-blue" onClick={()=>f.description.trim()&&onSave(f)}>Save</button></div></div>
        : <div className="modal-bg" ref={bgRef} onClick={e=>{if(e.target===bgRef.current)onClose();}}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{ display:"flex",alignItems:"center",marginBottom:14 }}><h2 style={{ fontSize:15,fontWeight:700 }}>{title}</h2><button className="btn btn-ghost" style={{ marginLeft:"auto",padding:"3px 9px",fontSize:12 }} onClick={onClose}>✕</button></div>
              {form}
              <div style={{ display:"flex",gap:7,marginTop:16,justifyContent:"flex-end" }}><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-blue" onClick={()=>f.description.trim()&&onSave(f)}>Save Issue</button></div>
            </div>
          </div>
      }
    </>
  );
}

function ReportModal({ zones, onClose, onGenerate }) {
  const [sel,setSel]=useState(""); const bgRef=useRef();
  return(
    <div className="modal-bg" ref={bgRef} onClick={e=>{if(e.target===bgRef.current)onClose();}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",alignItems:"center",marginBottom:4 }}><h2 style={{ fontSize:15,fontWeight:700 }}>Generate PDF Report</h2><button className="btn btn-ghost" style={{ marginLeft:"auto",padding:"3px 9px",fontSize:12 }} onClick={onClose}>✕</button></div>
        <p style={{ fontSize:12,color:"#475569",marginBottom:14 }}>Report includes annotated drawings with pin labels, per-issue detail cards (cropped drawing + photo), and full issue tables.</p>
        <label className="lbl">Filter by Zone</label>
        <select className="inp" value={sel} onChange={e=>setSel(e.target.value)} style={{ marginBottom:10 }}>
          <option value="">🌐 Entire Project (all zones)</option>
          {zones.map(z=><option key={z.id} value={z.id}>{z.name} — {zonePrefix(z.name)}</option>)}
        </select>
        <p style={{ fontSize:11,color:"#334155",marginBottom:16 }}>{sel?`Exporting: ${zones.find(z=>z.id===sel)?.name}`:`Exporting all ${zones.length} zone(s)`}</p>
        <div style={{ display:"flex",gap:7,justifyContent:"flex-end" }}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-green" onClick={()=>onGenerate(sel||null)}>⬇ Export PDF</button>
        </div>
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
<div id="status">載入資料庫中...</div>
<div id="result"></div>

<script>
  // 這整個 function 是 async 的，因為要等網路和 WASM 載入
  async function initAndQuery() {
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    try {
      status.textContent = '正在初始化 SQLite 引擎...';

      // === 這裡填你的設定（最關鍵！） ===
      const config = {
        from: "httpvfs",
        config: {
          // 你的 .sqlite 檔案在 GitHub Pages 的完整網址
          // 範例：https://benny123.github.io/my-website/data/mydatabase.sqlite
          url: "https://你的用戶名.github.io/你的repo名稱/你的資料庫檔案名.sqlite",

          // 手動填真實檔案大小（byte） ← 這步超重要，避開 GitHub gzip 問題
          // 怎麼查？本地用檔案總管看「大小」（不是大小 on disk），或 ls -l
          fileSize: 你的檔案大小這裡填數字,   // 例如：  5242880   ← 換成你的！

          // pageSize 建議設 1024 或 4096（跟你的 db 一致會更快）
          pageSize: 4096,
        }
      };

      status.textContent = '正在連線到資料庫...';

      // 初始化 httpvfs 版本的 sql.js
      const SQL = await initSqlJsHttpvfs(config);

      status.textContent = '資料庫已連線！正在查詢...';

      // 開啟資料庫（read-only 模式）
      const db = new SQL.Database();

      // 執行你的 SQL 查詢（改成你自己的 table 和欄位）
      const queryResult = db.exec(`
        SELECT * FROM your_table_name 
        LIMIT 10;
      `);

      // 如果有結果，轉成簡單 HTML 表格顯示
      if (queryResult.length > 0) {
        const columns = queryResult[0].columns;
        const rows = queryResult[0].values;

        let tableHtml = '<table border="1" style="border-collapse: collapse;">';
        tableHtml += '<tr>';
        columns.forEach(col => {
          tableHtml += `<th style="padding:8px;">${col}</th>`;
        });
        tableHtml += '</tr>';

        rows.forEach(row => {
          tableHtml += '<tr>';
          row.forEach(cell => {
            tableHtml += `<td style="padding:8px;">${cell ?? ''}</td>`;
          });
          tableHtml += '</tr>';
        });
        tableHtml += '</table>';

        resultDiv.innerHTML = tableHtml;
      } else {
        resultDiv.innerHTML = '<p>查無資料，或表格名稱錯誤。</p>';
      }

      status.textContent = '完成！';

    } catch (error) {
      console.error('錯誤：', error);
      status.textContent = '載入失敗：' + error.message;
      resultDiv.innerHTML = '<pre>' + error.stack + '</pre>';
    }
  }

  // 頁面載入完就自動跑（或你可以用按鈕觸發）
  window.addEventListener('load', initAndQuery);
  // 或是： document.getElementById('loadBtn').addEventListener('click', initAndQuery);
</script>
